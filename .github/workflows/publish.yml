name: Publish to PyPI

on:
  release:
    types:
      - published

permissions: {}

concurrency:
  group: publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build release distributions
    if: github.repository == 'Nimbus-Operations/check-dns-auth'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out the released commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.release.tag_name }}

      - name: Verify the release commit is on main
        run: git merge-base --is-ancestor HEAD origin/main

      - name: Verify the release tag matches the package version
        shell: bash
        run: |
          package_version="$({
            sed -n 's/^__version__ = "\([^"]*\)"$/\1/p' \
              src/check_dns_auth/version.py
          })"

          if [[ -z "$package_version" ]]; then
            echo "Could not read __version__ from src/check_dns_auth/version.py" >&2
            exit 1
          fi

          if [[ "$GITHUB_REF_NAME" != "v${package_version}" ]]; then
            echo "Release tag $GITHUB_REF_NAME does not match v${package_version}" >&2
            exit 1
          fi

      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.30"
          python-version: "3.14"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install test dependencies
        run: uv sync --locked --no-default-groups --group test

      - name: Run tests
        run: uv run --no-sync pytest -v tests

      - name: Build source and wheel distributions
        run: uv build --no-sources

      - name: Verify the built distribution version
        shell: bash
        run: |
          shopt -s nullglob
          wheels=(dist/*.whl)

          if [[ ${#wheels[@]} -ne 1 ]]; then
            echo "Expected exactly one wheel, found ${#wheels[@]}" >&2
            exit 1
          fi

          metadata_version="$({
            unzip -p "${wheels[0]}" '*.dist-info/METADATA' |
              sed -n 's/^Version: \(.*\)$/\1/p'
          })"

          if [[ "$GITHUB_REF_NAME" != "v${metadata_version}" ]]; then
            echo "Release tag $GITHUB_REF_NAME does not match built version v${metadata_version}" >&2
            exit 1
          fi

      - name: Upload distributions for publishing
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish release distributions
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/check-dns-auth
    permissions:
      id-token: write

    steps:
      - name: Download release distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-distributions
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          attestations: true
